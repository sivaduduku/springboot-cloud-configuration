server:
  port: 8762
spring:
  application:
    name: config-server
  boot:
    admin:
      client:
        url: http://localhost:8760
  cloud:
    config:
      server:
        git:
          uri: https://github.com/krish/microservices-course-on-youtube-config-store
          search-paths:
           - 'service-config/*service'
          #username: root
          #passphrase: 12345
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
logging:
  file:
    name: config-server.log
    max-history: 20
    max-size: 20MB
